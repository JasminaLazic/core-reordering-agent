<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Core Reordering Assistant</title>
    <style>
      :root {
        --bg: #f4f6fb;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --border: #dbe2ef;
        --primary: #1565c0;
        --primary-2: #0d47a1;
        --ok: #1b5e20;
        --warn: #ef6c00;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        color: var(--text);
        background: var(--bg);
      }
      .container {
        max-width: 1100px;
        margin: 32px auto;
        padding: 0 16px;
      }
      .title {
        font-size: 28px;
        font-weight: 700;
        margin: 0 0 6px;
      }
      .subtitle {
        margin: 0 0 20px;
        color: var(--muted);
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px;
        box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
      }
      .label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      textarea, input, select, button {
        font: inherit;
      }
      textarea {
        width: 100%;
        min-height: 130px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 12px;
        resize: vertical;
        background: #fff;
      }
      textarea:focus, input:focus, select:focus {
        outline: 2px solid #bbdefb;
        border-color: #90caf9;
      }
      .row {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        margin-top: 12px;
      }
      button.primary {
        border: 0;
        color: #fff;
        background: var(--primary);
        border-radius: 10px;
        padding: 10px 16px;
        font-weight: 600;
        cursor: pointer;
      }
      button.primary:hover { background: var(--primary-2); }
      button.secondary {
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
        border-radius: 10px;
        padding: 10px 14px;
        cursor: pointer;
      }
      .small {
        font-size: 12px;
        color: var(--muted);
      }
      .result {
        margin-top: 16px;
      }
      .status {
        display: inline-block;
        font-size: 12px;
        padding: 4px 9px;
        border-radius: 999px;
        border: 1px solid var(--border);
        margin-bottom: 10px;
      }
      .status.ok { color: var(--ok); border-color: #b7dfbc; background: #eef9ef; }
      .status.warn { color: var(--warn); border-color: #ffd5b1; background: #fff5ea; }
      .explain {
        margin: 10px 0 14px;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #fbfcff;
      }
      .warehouse-bar {
        display: flex;
        gap: 10px;
        align-items: center;
        margin: 10px 0;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      th, td {
        border: 1px solid var(--border);
        padding: 8px;
        text-align: left;
      }
      th {
        background: #f8faff;
        position: sticky;
        top: 0;
      }
      .table-wrap {
        overflow: visible;
        border: 1px solid var(--border);
        border-radius: 10px;
      }
      pre {
        margin: 0;
        background: #0f172a;
        color: #e2e8f0;
        border-radius: 10px;
        padding: 12px;
        overflow: auto;
        max-height: 300px;
        font-size: 12px;
      }
      .hidden { display: none; }
      .inline-input {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 7px 9px;
        min-width: 280px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="title">Core Reordering Assistant</h1>
      <p class="subtitle">Prompt in, warehouse plan out. Minimal UI for local and live testing.</p>

      <div class="card">
        <label class="label" for="prompt">Prompt</label>
        <textarea id="prompt">Give me CORE REORDERING for item number 3000393 for 53 calculation weeks and return table per warehouse with week, forecast, demand, quantity, order, whstock, ststock, downtime.</textarea>
        <div class="row">
          <button id="run" class="primary">Run</button>
          <button id="toggleAdvanced" class="secondary">Advanced</button>
          <label class="small"><input type="checkbox" id="wantExplanation" checked /> Include concise explanation</label>
        </div>
        <div id="advanced" class="row hidden">
          <label class="small">API Base URL</label>
          <input id="baseUrl" class="inline-input" value="http://127.0.0.1:8010" />
        </div>
      </div>

      <div id="result" class="card result">
        <div class="small">Ready.</div>
      </div>
    </div>

    <script>
      function $(id) { return document.getElementById(id); }
      function esc(v) {
        return String(v ?? "").replace(/[&<>"']/g, (c) => ({
          "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;"
        }[c]));
      }
      function fmt(v) {
        const n = Number(v);
        if (!Number.isFinite(n)) return "-";
        if (Math.abs(n - Math.round(n)) < 1e-9) return String(Math.round(n));
        return n.toFixed(3).replace(/\.?0+$/, "");
      }
      function toJsonOrNull(s) {
        if (typeof s !== "string") return null;
        try { return JSON.parse(s); } catch (_) {}

        // Try markdown fenced JSON block first.
        const fenced = s.match(/```(?:json)?\s*([\s\S]*?)```/i);
        if (fenced && fenced[1]) {
          try { return JSON.parse(fenced[1].trim()); } catch (_) {}
        }

        // Fallback: parse the largest {...} segment.
        const first = s.indexOf("{");
        const last = s.lastIndexOf("}");
        if (first >= 0 && last > first) {
          try { return JSON.parse(s.slice(first, last + 1)); } catch (_) {}
        }
        return null;
      }
      function summarize(core) {
        if (core?.explanation && String(core.explanation).trim()) {
          return String(core.explanation).trim();
        }
        if (!core || !Array.isArray(core.warehouse_views) || core.warehouse_views.length === 0) {
          return "No structured weekly warehouse projection available.";
        }
        const w = core.warehouse_views.length;
        const weeks = core.scope?.horizon_weeks ?? core.warehouse_views[0]?.weekly_projection?.length ?? 0;
        return `Generated ${weeks} weeks across ${w} warehouse${w > 1 ? "s" : ""} for item ${core.scope?.item_number ?? "-"}.`;
      }
      function renderCoreTable(core, rawResponse) {
        const result = $("result");
        const views = Array.isArray(core?.warehouse_views) ? core.warehouse_views : [];
        if (!views.length) {
          result.innerHTML = `
            <div class="status warn">No warehouse views</div>
            <div class="explain">${esc(summarize(core))}</div>
            <pre>${esc(rawResponse)}</pre>
          `;
          return;
        }
        const options = views.map((v, i) => `<option value="${i}">${esc(v.warehouse_code || `W${i + 1}`)}</option>`).join("");
        const explanation = summarize(core);
        result.innerHTML = `
          <div class="status ok">Structured response</div>
          <div class="explain">${esc(explanation)}</div>
          <div class="warehouse-bar">
            <label class="small" for="warehouseSelect">Warehouse</label>
            <select id="warehouseSelect">${options}</select>
          </div>
          <div id="tableHost"></div>
          <details style="margin-top:12px">
            <summary class="small">Raw response</summary>
            <pre>${esc(rawResponse)}</pre>
          </details>
        `;

        const host = $("tableHost");
        const select = $("warehouseSelect");
        function renderWarehouse(index) {
          const view = views[index] || views[0];
          const rows = (view.weekly_projection || []).map((r) => `
            <tr>
              <td>${esc(r.year_week || `W${String((r.week_index ?? 0) + 1).padStart(2, "0")}`)}</td>
              <td>${esc(fmt(r.forecast))}</td>
              <td>${esc(fmt(r.demand))}</td>
              <td>${esc(fmt(r.quantity))}</td>
              <td>${esc(fmt(r.order))}</td>
              <td>${esc(fmt(r.whstock))}</td>
              <td>${esc(fmt(r.ststock))}</td>
              <td>${esc(r.downtime || "-")}</td>
            </tr>
          `).join("");
          host.innerHTML = `
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Week</th>
                    <th>Forecast</th>
                    <th>Demand</th>
                    <th>Quantity</th>
                    <th>Order</th>
                    <th>WhStock</th>
                    <th>StStock</th>
                    <th>Downtime</th>
                  </tr>
                </thead>
                <tbody>
                  ${rows || `<tr><td colspan="8">No weekly rows.</td></tr>`}
                </tbody>
              </table>
            </div>
          `;
        }
        select.addEventListener("change", () => renderWarehouse(Number(select.value)));
        renderWarehouse(0);
      }

      $("toggleAdvanced").onclick = () => {
        $("advanced").classList.toggle("hidden");
      };

      $("run").onclick = async () => {
        const result = $("result");
        const baseUrl = $("baseUrl").value.trim().replace(/\/+$/, "");
        const promptInput = $("prompt").value.trim();
        const askExplain = $("wantExplanation").checked;
        const finalPrompt = askExplain
          ? `${promptInput}\nAlso include a concise explanation of the output.`
          : promptInput;

        result.innerHTML = `<div class="small">Running...</div>`;
        try {
          const resp = await fetch(`${baseUrl}/api/query`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              prompt: finalPrompt,
              store_id: "ALL",
              start_date: null,
              end_date: null,
            }),
          });
          const data = await resp.json();
          const raw = typeof data?.response === "string" ? data.response : JSON.stringify(data, null, 2);
          const parsed = typeof data?.response === "string" ? toJsonOrNull(data.response) : null;

          if (parsed && (Array.isArray(parsed.warehouse_views) || Array.isArray(parsed.weekly_projection))) {
            renderCoreTable(parsed, raw);
            return;
          }

          if (data?.error) {
            result.innerHTML = `
              <div class="status warn">Error</div>
              <div class="explain">${esc(data.error)}</div>
              ${data.hint ? `<div class="small">${esc(data.hint)}</div>` : ""}
            `;
            return;
          }

          result.innerHTML = `
            <div class="status ok">Text response</div>
            <div class="explain">${esc(raw)}</div>
            <details>
              <summary class="small">Raw JSON envelope</summary>
              <pre>${esc(JSON.stringify(data, null, 2))}</pre>
            </details>
          `;
        } catch (e) {
          result.innerHTML = `
            <div class="status warn">Failed to fetch</div>
            <div class="explain">${esc(String(e))}</div>
            <div class="small">Confirm API is running and base URL is correct.</div>
          `;
        }
      };
    </script>
  </body>
</html>
